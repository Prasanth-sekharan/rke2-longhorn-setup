---
# =============================================================================
# Longhorn StorageClass - 3 Replicas (Data Replication across SERVER nodes)
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "best-effort"
  # Encrypted volume (optional)
  # encrypted: "true"
---
# =============================================================================
# High-Performance StorageClass - 3 Replicas, strict local data
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-high-perf
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "2880"
  fsType: "ext4"
  dataLocality: "strict-local"
---
# =============================================================================
# Minimal StorageClass - 2 Replicas (less redundancy, more capacity)
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-minimal
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "2880"
  fsType: "ext4"
  dataLocality: "best-effort"
